services:
  - type: web
    name: finhub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: DATA_DIR
        value: /data
      - key: ALLOW_SIGNUP
        value: "true"         # set to "false" after you've created your accounts
    disk:
      name: finhub-data
      mountPath: /data
      sizeGB: 1
